<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 128" role="img" aria-labelledby="title desc" shape-rendering="crispEdges">
  <title id="title">QR Attendance Retro Logo</title>
  <desc id="desc">Pixel art style retro programming logo with CRT icon and text.</desc>

  <g transform="translate(8 12)">
    <rect x="0" y="0" width="92" height="72" fill="#1a1a1a" stroke="#e0e0e0" stroke-width="4"/>
    <rect x="8" y="8" width="76" height="48" fill="#0f0f0f" stroke="#33ff33" stroke-width="4"/>

    <rect x="16" y="20" width="8" height="8" fill="#33ff33"/>
    <rect x="24" y="28" width="8" height="8" fill="#33ff33"/>
    <rect x="16" y="36" width="8" height="8" fill="#33ff33"/>

    <rect x="40" y="36" width="24" height="8" fill="#00ffff"/>
    <rect x="64" y="36" width="8" height="8" fill="#00ffff"/>

    <rect x="72" y="16" width="8" height="8" fill="#ff00ff"/>
    <rect x="72" y="24" width="8" height="8" fill="#ffff00"/>

    <rect x="28" y="76" width="36" height="8" fill="#e0e0e0"/>
    <rect x="20" y="84" width="52" height="8" fill="#e0e0e0"/>
  </g>

  <text x="124" y="52" fill="#33ff33" font-family="'Press Start 2P','VT323','Courier New',monospace" font-size="24" letter-spacing="1">QR ATTENDANCE</text>
  <text x="124" y="88" fill="#00ffff" font-family="'VT323','Courier New',monospace" font-size="28" letter-spacing="2">&gt;_ RETRO CHECK-IN SYSTEM</text>
</svg>
